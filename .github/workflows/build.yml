name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Cache buildozer project directory
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config zlib1g-dev \
            libffi-dev libssl-dev libsqlite3-dev

      - name: Constrain pip version to avoid p4a/pip internal incompatibility
        run: |
          echo "pip<24.1" > /tmp/pip-constraints.txt
          echo "PIP_CONSTRAINT=/tmp/pip-constraints.txt" >> "$GITHUB_ENV"

      - name: Install buildozer
        run: |
          pip install --upgrade "pip<24.1"
          pip install buildozer cython==0.29.36

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: training-app-apk
          path: bin/*.apk
